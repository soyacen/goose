syntax = "proto3";
package leo.goose.example.response_body.v1;
option go_package = "github.com/soyacen/goose/example/response_body/v1;response_body";

import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/rpc/http.proto";

service ResponseBody {
  rpc ClientStream(stream Request) returns (Response) {
    option (google.api.http) = {
      post: "/ws/client-stream"
    };
  }

  rpc ServerStream(Request) returns (stream Response) {
    option (google.api.http) = {
      post: "/ws/server-stream"
    };
  }

  rpc BidStream(stream Request) returns (stream Response) {
    option (google.api.http) = {
      post: "/ws/bidi-stream"
    };
  }
}

message Request { string name = 1; }

message Response { string message = 1; }
